name: UpdatePilot
options:
  bundleIdPrefix: com.cramleo
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "10"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  UpdatePilot:
    type: application
    platform: macOS
    sources:
      - App
      - Core
    resources:
      - App/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cramleo.UpdatePilot
        PRODUCT_NAME: UpdatePilot
        INFOPLIST_KEY_CFBundleDisplayName: UpdatePilot
        INFOPLIST_KEY_NSHumanReadableCopyright: Copyright © 2026 Cramleo
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
  UpdatePilotTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
      - Core
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cramleo.UpdatePilotTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: ""
        BUNDLE_LOADER: ""
schemes:
  UpdatePilot:
    build:
      targets:
        UpdatePilot: all
        UpdatePilotTests: [test]
    test:
      targets:
        - UpdatePilotTests
